---
layout: default
---

{% include base_path %}

<div id="main" role="main">
  <article class="page tip-page" itemscope itemtype="http://schema.org/Article">
    {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
    {% if page.date %}<meta itemprop="datePublished" content="{{ page.date | date: "%B %d, %Y" }}">{% endif %}

    <div class="tip-header">
      <div class="tip-category-badge">💡 Tips</div>
      <h1 class="tip-title" itemprop="headline">{{ page.title | markdownify | remove: "<p>" | remove: "</p>" }}</h1>
      <div class="tip-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
        {% for tag in page.tags %}
          <a href="{{ base_path }}/tags/#{{ tag | slugify }}" class="tag-chip">{{ tag }}</a>
        {% endfor %}
      </div>
    </div>

    <div class="tip-body page__content" itemprop="text">
      {{ content }}
    </div>

    <div class="tip-footer">
      <a href="{{ base_path }}/tips/" class="tip-back">← 모든 Tips 보기</a>
    </div>
  </article>
</div>
