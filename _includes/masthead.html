{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item{% if link.tooltip %} has-tooltip{% endif %}">
              <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
              {% if link.tooltip %}<span class="nav-tooltip">{{ link.tooltip }}</span>{% endif %}
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
    <button id="theme-toggle" aria-label="테마 전환">
      <i class="fa fa-moon" id="theme-icon"></i>
    </button>
  </div>
</div>
